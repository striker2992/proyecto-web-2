<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web PC</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- HEADER -->

    <div class="header">

        <div class="logo">
           TechZone
        </div>

        <div class="menu">
            <a href="#">Inicio</a>
            <a href="productos.html">Productos</a>
            <a href="#">Nosotros</a>
            <a href="#">Contacto</a>

            <select>
                <option>Opciones</option>
            </select>
        </div>

    </div>


    <!-- CARRUSEL 3D -->

    <div class="ruleta">

        <button class="boton atras" onclick="anterior()">
            ❮
        </button>

        <div class="slider">
            <div class="slide prev">
                <img src="img/teclado1.jpg">
            </div>
            <div class="slide active">
                <img src="img/teclado2.jpg">
            </div>
            <div class="slide next">
                <img src="img/teclado3.jpg">
            </div>
        </div>

        <button class="boton siguiente" onclick="siguiente()">
            ❯
        </button>

    </div>

    <script>

        const imagenes = [
            "img/teclado1.jpg",
            "img/teclado2.jpg",
            "img/teclado3.jpg",
            "img/teclado4.jpg"
        ];

        let index = 1;

        const slides = document.querySelectorAll(".slide img");

        function actualizar() {

            let prev =
                (index - 1 + imagenes.length) % imagenes.length;

            let next =
                (index + 1) % imagenes.length;

            slides[0].src = imagenes[prev];
            slides[1].src = imagenes[index];
            slides[2].src = imagenes[next];
        }

        function siguiente() {

            index++;

            if (index >= imagenes.length) {
                index = 0;
            }

            actualizar();
        }

        function anterior() {

            index--;

            if (index < 0) {
                index = imagenes.length - 1;
            }

            actualizar();
        }

        setInterval(siguiente, 4000);

    </script>

    <!-- TEXTO -->

    <div class="texto">

        <h1>Bienvenido</h1>

        <p>
            TechZone.
        </p>

    </div>

    <!-- GALERIA -->

    <div class="galeria">
        <div class="card">
            <img src="img/pack1.jpg">
            <h3>Pack 1</h3>
        </div>
        <div class="card">
            <img src="img/pack2.jpg">
            <h3>Pack 2</h3>
        </div>

        <div class="card">
            <img src="img/pack3.jpg">
            <h3>Pack 3</h3>
        </div>

        <div class="card">
            <img src="img/pack4.jpg">
            <h3>Pack 4</h3>
        </div>

    </div>

    <!-- FOOTER -->

    <div class="footer">

        <div>
            © TechZone
        </div>

        <div class="redes">

            <div class="red"></div>
            <div class="red"></div>
            <div class="red"></div>

        </div>

    </div>

</body>

</html>
